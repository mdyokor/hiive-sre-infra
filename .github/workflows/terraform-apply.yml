name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"

permissions:
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  apply-dev:
    name: Apply — dev
    runs-on: ubuntu-latest
    environment: dev        # GitHub environment (no approval gate for dev)
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init
        working-directory: environments/dev
      - run: terraform apply -auto-approve
        working-directory: environments/dev

  apply-uat:
    name: Apply — uat
    runs-on: ubuntu-latest
    needs: apply-dev
    environment: uat        # Requires 1 reviewer approval in GitHub settings
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init
        working-directory: environments/uat
      - run: terraform apply -auto-approve
        working-directory: environments/uat

  apply-prod:
    name: Apply — prod
    runs-on: ubuntu-latest
    needs: apply-uat
    environment: prod       # Requires 2 reviewer approvals in GitHub settings
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init
        working-directory: environments/prod
      - run: terraform apply -auto-approve
        working-directory: environments/prod
